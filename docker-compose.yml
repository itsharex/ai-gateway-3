# Base configuration shared by dev and prod.
# Use with an override file:
#   Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  ferrogw:
    image: ghcr.io/ferro-labs/ai-gateway:latest
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # Provider API keys (set at least one):
      # - OPENAI_API_KEY=sk-...
      # - ANTHROPIC_API_KEY=sk-...
      # - GEMINI_API_KEY=...
      # - MISTRAL_API_KEY=...
      # - GROQ_API_KEY=gsk_...
      # - TOGETHER_API_KEY=...
      # - COHERE_API_KEY=...
      # - DEEPSEEK_API_KEY=...
      # - PERPLEXITY_API_KEY=...
      # - FIREWORKS_API_KEY=...
      # - AI21_API_KEY=...
      # - XAI_API_KEY=...
      # - CEREBRAS_API_KEY=...
      # - DEEPINFRA_API_KEY=...
      # - MOONSHOT_API_KEY=...
      # - NOVITA_API_KEY=...
      # - NVIDIA_NIM_API_KEY=...
      # - OPENROUTER_API_KEY=...
      # - QWEN_API_KEY=...
      # - SAMBANOVA_API_KEY=...
      # Replicate:
      # - REPLICATE_API_TOKEN=...
      # Azure OpenAI:
      # - AZURE_OPENAI_API_KEY=...
      # - AZURE_OPENAI_ENDPOINT=...
      # - AZURE_OPENAI_DEPLOYMENT=...
      # - AZURE_OPENAI_API_VERSION=...
      # Azure AI Foundry:
      # - AZURE_FOUNDRY_API_KEY=...
      # - AZURE_FOUNDRY_ENDPOINT=...
      # - AZURE_FOUNDRY_API_VERSION=...
      # AWS Bedrock (use bearer token, instance-role auth with AWS_REGION, or static credentials):
      # - AWS_BEARER_TOKEN_BEDROCK=...
      # - AWS_REGION=us-east-1
      # - AWS_ACCESS_KEY_ID=...
      # - AWS_SECRET_ACCESS_KEY=...
      # - AWS_SESSION_TOKEN=...
      # Google Vertex AI:
      # - VERTEX_AI_PROJECT_ID=...
      # - VERTEX_AI_REGION=us-central1
      # - VERTEX_AI_API_KEY=...
      # - VERTEX_AI_SERVICE_ACCOUNT_JSON=...
      # Hugging Face:
      # - HUGGING_FACE_API_KEY=...
      # Cloudflare Workers AI:
      # - CLOUDFLARE_API_KEY=...
      # - CLOUDFLARE_ACCOUNT_ID=...
      # Databricks:
      # - DATABRICKS_TOKEN=...
      # - DATABRICKS_HOST=https://<workspace>.azuredatabricks.net
      # Ollama (local):
      # - OLLAMA_HOST=http://host.docker.internal:11434
      # - OLLAMA_MODELS=llama3,gemma
      # Ollama Cloud:
      # - OLLAMA_API_KEY=...
      # - OLLAMA_CLOUD_MODELS=gpt-oss:20b,gpt-oss:120b
      # - OLLAMA_CLOUD_BASE_URL=https://ollama.com
      # Optional config file:
      # - GATEWAY_CONFIG=/etc/ferrogw/config.yaml
    # volumes:
    #   - ./config.yaml:/etc/ferrogw/config.yaml:ro
