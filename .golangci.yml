version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    gocyclo:
      min-complexity: 30

  exclusions:
    rules:
      # Test fixtures legitimately repeat literals (tool names, IDs, JSON
      # fragments); enforce the constant rule on production code only.
      - path: _test\.go
        linters:
          - goconst
      # Tests compare error values by identity on purpose; the wrapped-error
      # checks apply to production code only.
      - path: _test\.go
        linters:
          - errorlint
