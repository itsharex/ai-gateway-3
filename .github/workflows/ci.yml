# CI workflow — build, test (with race detector), lint.
# Pushes run only on main; every other branch is covered once via its pull
# request, so a push to a branch with an open PR does not run CI twice.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "release/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"

# Cancel superseded in-progress runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25.11"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Test (race + short)
        # Per-package binary timeout. The gateway package's -race suite has grown
        # past the old 60s budget (runs ~2min under -race on slower runners), so a
        # legitimate, passing run was being killed mid-test. Raised to 180s.
        run: go test -v -short -race -timeout 180s ./...

      - name: Test coverage
        if: matrix.go == '1.25.11'
        id: coverage
        run: |
          go test -short -race -coverprofile=coverage.out -covermode=atomic ./...
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "Total coverage: $total"
          {
            echo "## Go Coverage"
            echo ""
            echo "Go version: \`${{ matrix.go }}\`"
            echo "Total coverage: \`$total\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: matrix.go == '1.25.11'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-go-${{ matrix.go }}
          path: coverage.out
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: matrix.go == '1.25.11'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: unittests
          name: ai-gateway-go-${{ matrix.go }}
          fail_ci_if_error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.11"
          check-latest: true
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run integration tests
        run: make test-integration

  vulnerability:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.11"
          check-latest: true
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.25.11'
        check-latest: true

    - name: Run golangci-lint (v2)
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
      with:
        version: v2.4.0
        args: --verbose
